apiVersion: agents.x-k8s.io/v1beta1
kind: Sandbox
metadata:
  name: agent-with-custom-skills
  namespace: agent-sandbox-system
spec:
  serviceAccountName: agent-sandbox-sa
  agent:
    name: agent-runner
    image: ghcr.io/duyet/agent-runner:latest
  env:
    - name: GITHUB_REPO
      value: "owner/repo"
    - name: LLM_API_KEY
      valueFrom:
        secretKeyRef:
          name: agent-runner-llm-key
          key: api-key
    - name: GITHUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: agent-runner-gh-token
          key: token
    - name: ALLOWED_USERS
      value: "duyet"
    # Custom skills configuration
    - name: ENABLED_SKILLS
      value: "run-tests,commit-conventions,self-fix,analyze,refactor,document,optimize,security-scan"
    - name: SKILL_RUN_TESTS_COMMAND
      value: "pytest -v --cov=. --cov-report=html"
    - name: SKILL_COMMIT_CONVENTIONS
      value: "conventional-commits"
    - name: SKILL_ANALYSIS_DEPTH
      value: "comprehensive"
    - name: SYSTEM_PROMPT
      value: |
        You are an advanced development agent with specialized skills.

        Available Skills:
        - run-tests: Execute test suites with coverage
        - commit-conventions: Follow conventional commit format
        - self-fix: Self-diagnose and fix issues
        - analyze: Comprehensive code analysis
        - refactor: Code refactoring and optimization
        - document: Generate documentation
        - optimize: Performance optimization
        - security-scan: Security vulnerability analysis

        Workflow for PR fixes:
        1. Use 'analyze' skill to understand the codebase
        2. Use 'security-scan' if handling security issues
        3. Implement fixes using appropriate tools
        4. Use 'run-tests' skill to verify changes
        5. Use 'refactor' skill if optimization needed
        6. Use 'document' skill to update docs
        7. Use 'commit-conventions' for commit messages
        8. Create PR with comprehensive description

        Each skill provides specialized capabilities - use them appropriately
        for best results. Always combine multiple skills when needed.
  tasks:
    - name: skilled-fix
      instruction: "Use appropriate skills to fix this"
      branchPattern: "skill/{{instruction}}"
      createPR: true
      runTests: true
      analyzeCode: true
      generateDocs: true
      securityCheck: true
  resources:
    requests:
      cpu: 1500m
      memory: 2Gi
    limits:
      cpu: 4000m
      memory: 6Gi
  timeout:
    duration: 60m
  volumes:
    - name: workspace
      emptyDir: {}
    - name: cache
      emptyDir:
        sizeLimit: 15Gi
    - name: docs
      emptyDir:
        sizeLimit: 2Gi
    - name: reports
      emptyDir:
        sizeLimit: 2Gi
  volumeMounts:
    - name: docs
      mountPath: /tmp/docs
    - name: reports
      mountPath: /tmp/reports
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
  # Custom skill containers
  sidecars:
    - name: security-scanner
      image: ghcr.io/securecodebox/scanner:latest
      command: ["/bin/sh"]
      args: ["-c", "sleep infinity"]
      resources:
        requests:
          cpu: 200m
          memory: 256Mi