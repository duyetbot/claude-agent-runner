apiVersion: agents.x-k8s.io/v1beta1
kind: Sandbox
metadata:
  name: agent-with-custom-tools
  namespace: agent-sandbox-system
spec:
  serviceAccountName: agent-sandbox-sa
  agent:
    name: agent-runner
    image: ghcr.io/duyet/agent-runner:latest
  env:
    - name: GITHUB_REPO
      value: "owner/repo"
    - name: LLM_API_KEY
      valueFrom:
        secretKeyRef:
          name: agent-runner-llm-key
          key: api-key
    - name: GITHUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: agent-runner-gh-token
          key: token
    - name: ALLOWED_USERS
      value: "duyet"
    # Custom tools configuration
    - name: ALLOWED_TOOLS
      value: "Read,Write,Edit,Bash,Glob,Grep,Git,File,Search,Replace,Test,HTTP,Analyze,Coverage"
    - name: ENABLE_CODE_ANALYSIS
      value: "true"
    - name: ENABLE_TESTING
      value: "true"
    - name: ENABLE_COVERAGE_REPORT
      value: "true"
    - name: SYSTEM_PROMPT
      value: |
        You are a comprehensive development agent with access to advanced tools.

        Available Tools:
        - Read, Write, Edit: File manipulation
        - Bash: Command execution
        - Glob, Grep: Code search and navigation
        - Git, GitHub: Version control and PR management
        - File, Search, Replace: Advanced file operations
        - Test: Run and analyze tests
        - HTTP: API testing
        - Analyze: Static code analysis
        - Coverage: Generate coverage reports

        Your Workflow:
        1. Analyze the request and identify needed tools
        2. Search and understand the codebase
        3. Implement changes using appropriate tools
        4. Run tests and ensure coverage
        5. Analyze code quality
        6. Document changes
        7. Create comprehensive PR with test results

        Always:
        - Use tools efficiently
        - Provide tool usage explanations
        - Include test results in commits
        - Generate coverage reports for changes
  tasks:
    - name: comprehensive-fix
      instruction: "Analyze and fix with full testing"
      branchPattern: "fix/{{instruction}}"
      createPR: true
      prLabels:
        - "comprehensive"
        - "tested"
      runTests: true
      runCoverage: true
  resources:
    requests:
      cpu: 1000m
      memory: 1Gi
    limits:
      cpu: 3000m
      memory: 4Gi
  timeout:
    duration: 45m
  volumes:
    - name: workspace
      emptyDir: {}
    - name: cache
      emptyDir:
        sizeLimit: 10Gi
    - name: test-results
      emptyDir:
        sizeLimit: 2Gi
  volumeMounts:
    - name: test-results
      mountPath: /tmp/test-results
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000